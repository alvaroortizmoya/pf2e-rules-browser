name: Release Creation

# Triggers only on tags shaped like "0.4.3" (no "v" prefix — Foundry compares
# version strings in a way that breaks if some tags have "v" and others
# don't, so this repo standardizes on plain semantic versions).
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version and download URL in module.json
        run: |
          VERSION="${GITHUB_REF_NAME}"
          DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}/module.zip"
          jq --arg version "$VERSION" --arg download "$DOWNLOAD_URL" \
            '.version = $version | .download = $download' \
            module.json > module.json.tmp
          mv module.json.tmp module.json

      - name: Create module.zip
        run: |
          zip -r module.zip module.json scripts styles templates lang README.md LICENSE CHANGELOG.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            module.json
            module.zip
